<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>OSPF Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>OSPF — Simulateur de routage par état de lien</h1>
    <div class="controls">
      <button id="btn-start-all" class="btn btn-primary">Démarrer tout</button>
      <button id="btn-stop-all" class="btn btn-danger">Arrêter tout</button>
    </div>
  </header>

  <main>
    <section class="topology-panel">
      <canvas id="topology" width="700" height="500"></canvas>
    </section>

    <section class="routers-panel" id="routers-panel"></section>
  </main>

  <section class="add-router-panel">
    <h2>Ajouter un routeur</h2>
    <div class="form-row">
      <input type="text" id="new-router-id" placeholder="ID (ex: R4)" />
      <input type="number" id="new-router-port" placeholder="Port UDP (ex: 9004)" />
      <input type="number" id="new-router-status-port" placeholder="Port statut (ex: 9104)" />
    </div>
    <div id="new-router-links"></div>
    <button id="btn-add-router" class="btn btn-primary">Créer le routeur</button>
  </section>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon">⚠</div>
      <h3 id="modal-title">Confirmer</h3>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn">Annuler</button>
        <button id="modal-confirm" class="btn btn-danger">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
